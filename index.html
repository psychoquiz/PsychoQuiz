<!DOCTYPE html>
<html>
<head>
  <title>PsychoQuiz GitHub - Quiz di Psicologia Online</title>

  <meta name="google-site-verification" content="Oftahp3yLVsmYHEXx1s6UvEe3Yze6kEMNYgIoSQl3_k" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
      font-family: Arial, sans-serif;
    }

    header {
      width: 100%;
      background: #6b3e2e;
      padding: 10px 20px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .left-header {
      display: flex;
      align-items: center;
      gap: 25px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f3c6d0;
      font-family: "Emilys Candy", serif;
      font-size: 32px;
    }

    .icon { font-size: 34px; }

    .menu {
      display: flex;
      gap: 10px;
    }

    .menu-item {
      background: #f3c6d0;
      color: #6b3e2e;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover {
      background: #e8a6b8;
      transform: scale(1.05);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .language {
      background: #f3c6d0;
      color: #6b3e2e;
      padding: 5px 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    .search-icon {
      color: #f3c6d0;
      font-size: 20px;
      cursor: pointer;
    }

    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 80px;
    }

    .card {
      background: #f3c6d0;
      width: 260px;
      height: 140px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #6b3e2e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      flex-direction: column;
    }

    .card:hover {
      background: #e8a6b8;
      transform: scale(1.05);
    }

    .subtitle {
      font-size: 13px;
      font-weight: normal;
      margin-top: 6px;
    }

    .materie-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      padding: 20px;
    }

    #materie .card {
      width: 170px;
      height: 60px;
      font-size: 15px;
      flex-direction: row;
    }

  </style>
</head>

<body>

<header>
  <div class="left-header">
    <div class="title"><span class="icon">Ψ</span> PsychoQuiz</div>
  </div>
</header>

<div class="page" id="materie" style="display:flex;">
  <div class="materie-grid">

    <div class="card">Psicologia generale</div>
    <div class="card">Psicologia sociale</div>
    <div class="card">Psicologia dello sviluppo</div>
    <div class="card">Psicobiologia</div>
    <div class="card">Psicologia Clinica</div>

  </div>
</div>

<script>

const questions = [
  { materia: "Psicologia sociale", q: "..." },
  { materia: "Psicologia sociale", q: "..." },
  { materia: "Psicologia generale", q: "..." }
];

function contaDomandePerMateria() {
  const conteggi = {};

  questions.forEach(q => {
    if (!conteggi[q.materia]) conteggi[q.materia] = 0;
    conteggi[q.materia]++;
  });

  document.querySelectorAll("#materie .card").forEach(card => {
    const nome = card.innerText.trim();

    if (conteggi[nome]) {
      card.innerText = nome + " (" + conteggi[nome] + ")";
    }
  });
}

contaDomandePerMateria();

</script>

</body>
</html>
