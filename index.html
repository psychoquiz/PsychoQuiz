<!DOCTYPE html>
<html>
<head>
<title>PsychoQuiz GitHub - Quiz di Psicologia Online</title>

<meta name="google-site-verification" content="Oftahp3yLVsmYHEXx1s6UvEe3Yze6kEMNYgIoSQl3_k" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
  font-family: Arial, sans-serif;
}

/* ======= TUO CSS UGUALE (non l'ho toccato per evitare errori) ======= */

header {
  width: 100%;
  background: #6b3e2e;
  padding: 10px 20px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left-header { display: flex; align-items: center; gap: 25px; }

.title {
  display: flex; align-items: center; gap: 10px;
  color: #f3c6d0;
  font-family: "Emilys Candy", serif;
  font-size: 32px;
}

.icon { font-size: 34px; }

.menu { display: flex; gap: 10px; }

.menu-item {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.page { display: none; flex-direction: column; align-items: center; margin-top: 80px; }
.card { background: #f3c6d0; width: 260px; height: 140px; border-radius: 16px;
  display: flex; justify-content: center; align-items: center;
  flex-direction: column; cursor: pointer; }

#materie .card {
  width: 170px;
  height: 60px;
  flex-direction: row;
}

.card.selected {
  background: #6b3e2e;
  color: #f3c6d0;
}
</style>
</head>

<body>

<header>
  <div class="left-header">
    <div class="title"><span class="icon">Ψ</span> PsychoQuiz</div>
    <div class="menu">
      <div class="menu-item" onclick="showHome()">Home</div>
      <div class="menu-item">Quiz</div>
      <div class="menu-item">Risultati</div>
    </div>
  </div>
</header>

<!-- HOME -->
<div class="page" id="home" style="display:flex;">
  <div class="card" onclick="showMaterie()">Quiz per materia</div>
</div>

<!-- MATERIE -->
<div class="page" id="materie">
  <div class="card">Psicologia generale</div>
  <div class="card">Psicologia sociale</div>
  <div class="card">Psicologia dello sviluppo</div>
  <div class="card">Psicobiologia</div>
</div>

<script>
/* NAV */
function showHome() {
  document.getElementById("home").style.display = "flex";
  document.getElementById("materie").style.display = "none";
}

function showMaterie() {
  document.getElementById("home").style.display = "none";
  document.getElementById("materie").style.display = "flex";
}

/* =========================
   FUNZIONE CONTEGGI
   ========================= */

function updateSubjectCounts() {
  document.querySelectorAll("#materie .card").forEach(card => {
    const name = card.innerText.split(" (")[0];
    const count = (window.questionsBySubject?.[name]?.length) || 0;
    card.innerText = `${name} (${count})`;
  });
}

/* aspetta caricamento pagina */
window.addEventListener("DOMContentLoaded", () => {
  updateSubjectCounts();
});
</script>

<!-- IMPORTANTE: questions.js -->
<script src="questions.js"></script>

</body>
</html>
