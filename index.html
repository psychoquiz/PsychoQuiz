<!DOCTYPE html>
<html>
<head>
  <title>PsychoQuiz</title>

  <!-- FONT SOLO PER TITOLO -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    /* HEADER */
    header {
      width: 100%;
      background: #6b3e2e;
      padding: 15px 20px;
      position: absolute;
      top: 0;
      left: 0;

      display: flex;
      align-items: center;
      justify-content: space-between;

      box-sizing: border-box;
    }

    /* TITOLO */
    .title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f3c6d0;
      font-family: "Emilys Candy", serif;
      font-size: 28px;
    }

    .icon {
      font-size: 32px;
      color: #f3c6d0;
    }

    /* CARD HOME */
    .home-container {
      display: flex;
      gap: 20px;
      margin-top: 80px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card-option {
      background: #f3c6d0;
      width: 220px;
      height: 150px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #6b3e2e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      padding: 10px;
    }

    .card-option:hover {
      background: #e8a6b8;
      transform: scale(1.05);
    }

    .subtitle {
      font-size: 14px;
      font-weight: normal;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <header>
    <div class="title">
      <span class="icon">Ψ</span>
      PsychoQuiz
    </div>
  </header>

  <div class="home-container">

    <div class="card-option">
      <div>
        Casi clinici
        <div class="subtitle">Analisi di casi reali e simulati</div>
      </div>
    </div>

    <div class="card-option">
      <div>
        Quiz completo
        <div class="subtitle">Tutte le materie di psicologia</div>
      </div>
    </div>

    <div class="card-option">
      <div>
        Quiz per materia
        <div class="subtitle">Seleziona una disciplina specifica</div>
      </div>
    </div>

  </div>

</body>
</html>

</body>
</html>
