<!DOCTYPE html>
<html>
<head>
  <title>PsychoQuiz</title>

  <!-- FONT SOLO TITOLO -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
      height: 100vh;
    }

    /* HEADER MARRONE */
    header {
      width: 100%;
      background: #6b3e2e;
      padding: 12px 20px;
      box-sizing: border-box;

      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* TITOLO */
    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f3c6d0;
      font-family: "Emilys Candy", serif;
      font-size: 32px;
    }

    .icon {
      font-size: 34px;
    }

    /* LINGUA + LENTE */
    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
      color: #f3c6d0;
    }

    .language {
      border: 1px solid #f3c6d0;
      padding: 5px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    .search-icon {
      color: #f3c6d0;
      font-size: 20px;
      cursor: pointer;
    }

    /* MENU CENTRALE (Home / Quiz / Risultati) */
    .menu {
      display: flex;
      justify-content: center;
      gap: 15px;
      background: #6b3e2e;
      padding: 10px;
    }

    .menu-item {
      background: #f3c6d0;
      color: #6b3e2e;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover {
      background: #e8a6b8;
      transform: scale(1.05);
    }

    /* HOME CONTENT */
    .home {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 80px;
      flex-wrap: wrap;
    }

    .card {
      background: #f3c6d0;
      width: 220px;
      height: 150px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #6b3e2e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      padding: 10px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .card:hover {
      background: #e8a6b8;
      transform: scale(1.05);
    }

    .subtitle {
      font-size: 13px;
      font-weight: normal;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="title">
      <span class="icon">Ψ</span>
      PsychoQuiz
    </div>

    <div class="header-right">
      <div class="language">IT ▼</div>
      <div class="search-icon">🔍</div>
    </div>
  </header>

  <!-- MENU -->
  <div class="menu">
    <div class="menu-item">Home</div>
    <div class="menu-item">Quiz</div>
    <div class="menu-item">Risultati</div>
  </div>

  <!-- HOME -->
  <div class="home">

    <div class="card">
      <div>
        Casi clinici
        <div class="subtitle">Analisi di casi reali e simulati</div>
      </div>
    </div>

    <div class="card">
      <div>
        Quiz completo
        <div class="subtitle">Tutte le materie di psicologia</div>
      </div>
    </div>

    <div class="card">
      <div>
        Quiz per materia
        <div class="subtitle">Seleziona una disciplina</div>
      </div>
    </div>

  </div>

</body>
</html>
