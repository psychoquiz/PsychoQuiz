<!DOCTYPE html>
<html>
<head>
  <title>PsychoQuiz</title>

  <!-- FONT SOLO TITOLO -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* HEADER */
    header {
      width: 100%;
      background: #6b3e2e;
      padding: 15px 20px;
      position: absolute;
      top: 0;
      left: 0;
      box-sizing: border-box;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f3c6d0;
      font-family: "Emilys Candy", serif;
      font-size: 32px;
    }

    .icon {
      font-size: 34px;
    }

    /* RIQUADRO MARRONE PRINCIPALE */
    .container {
      background: #6b3e2e;
      padding: 40px;
      border-radius: 25px;
      display: flex;
      gap: 20px;
      margin-top: 90px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    /* RIQUADRI ROSA */
    .card {
      background: #f3c6d0;
      width: 200px;
      height: 150px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #6b3e2e;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      padding: 10px;
    }

    .card:hover {
      background: #e8a6b8;
      transform: scale(1.05);
    }

    .subtitle {
      font-size: 13px;
      font-weight: normal;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="title">
      <span class="icon">Ψ</span>
      PsychoQuiz
    </div>
  </header>

  <!-- RIQUADRO MARRONE -->
  <div class="container">

    <div class="card">
      <div>
        Casi clinici
        <div class="subtitle">Analisi di casi reali e simulati</div>
      </div>
    </div>

    <div class="card">
      <div>
        Quiz completo
        <div class="subtitle">Tutte le materie di psicologia</div>
      </div>
    </div>

    <div class="card">
      <div>
        Quiz per materia
        <div class="subtitle">Seleziona una disciplina</div>
      </div>
    </div>

  </div>

</body>
</html>
