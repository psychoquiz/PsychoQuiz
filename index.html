<style>
html, body {
  height: 100%;
  margin: 0;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
  font-family: Arial, sans-serif;
}

header {
  width: 100%;
  background: #6b3e2e;
  padding: 10px 20px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 25px;
}

.title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #f3c6d0;
  font-family: "Emilys Candy", serif;
  font-size: 32px;
}

.icon { font-size: 34px; }

.menu {
  display: flex;
  gap: 10px;
}

.menu-item {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.menu-item:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.language {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 5px 10px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.language:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.search-icon {
  color: #f3c6d0;
  font-size: 20px;
  cursor: pointer;
}

.page {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 80px;
}

.card {
  background: #f3c6d0;
  width: 260px;
  height: 140px;
  border-radius: 16px;
  display: flex;
  justify-content: center;
  align-items: center;

  color: #6b3e2e;

.card:hover {

#materie {

.materie-wrapper {

#startQuizBtn {
  display: none;
  background: #6b3e2e;

  font-weight: bold;
  font-size: 24px;

  text-align: center;
  padding: 15px 0;
  transition: 0.3s;
  font-family: "Emilys Candy", serif;
  border: 2px solid #f3c6d0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  margin: 10px auto;
}

#startQuizBtn:hover {
  background: #8b5e4e;
  transform: scale(1.02);
  box-shadow: 0 6px 15px rgba(0,0,0,0.3);
}

.materie-topbar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

#materieSearch {
  width: 260px;
  padding: 8px 12px;
  border-radius: 12px;
  border: none;

  text-align: center;
  font-size: 14px;
}

.materie-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  padding: 20px;
}

#materie .card {
  width: 170px;
  height: 60px;
  font-size: 15px;
  flex-direction: row;
  border: 2px solid #6b3e2e;
  border-radius: 10px;
  transition: all 0.3s ease;
}

#materie .card:hover {
  border: 2px solid #f3c6d0;
  transform: scale(1.02);
}

#materie .card.selected {
  background: #6b3e2e;
  color: #f3c6d0;
  border: 2px solid #f3c6d0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

#quizConfig {
  display: none;
  flex-direction: column;
  align-items: center;
}

.config-box {
  background: #f3c6d0;
  padding: 20px;
  border-radius: 16px;
  width: 260px;
  text-align: center;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin: 8px 0;
}

.start-btn {
  background: #6b3e2e;
  color: #f3c6d0;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
  font-family: "Emilys Candy", serif;
  font-size: 18px;
  transition: 0.3s;
}

.start-btn:hover {
  background: #8b5e4e;
  transform: scale(1.02);
}

#selectedMaterieLabel {
  margin-bottom: 10px;
  font-size: 13px;
  color: #6b3e2e;
}

/* ===== SCHERMATA QUIZ ===== */
#quiz {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  margin-top: 40px;
  padding: 20px;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 600px;
  margin-bottom: 20px;
  font-size: 16px;
  color: #6b3e2e;
  font-weight: bold;
}

.quiz-progress {
  width: 100%;
  max-width: 600px;
  height: 8px;
  background: #e8a6b8;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  background: #6b3e2e;
  width: 0%;
  transition: width 0.3s;
}

.quiz-container {
  background: #f3c6d0;
  padding: 40px;
  border-radius: 16px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.question-text {
  font-size: 20px;
  font-weight: bold;
  color: #6b3e2e;
  margin-bottom: 30px;
  text-align: center;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option {
  background: white;
  border: 2px solid #e8a6b8;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 16px;
  color: #6b3e2e;
}

.option:hover {
  background: #e8a6b8;
  transform: translateX(5px);
}

.option-letter {
  background: #6b3e2e;
  color: #f3c6d0;
  width: 30px;
  height: 30px;
  min-width: 30px;
  min-height: 30px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  flex-shrink: 0;
}

.option.selected {
  background: #6b3e2e;
  color: #f3c6d0;
  border-color: #6b3e2e;
}

.option.selected .option-letter {
  background: #f3c6d0;
  color: #6b3e2e;
}

.option.correct {
  background: #4caf50;
  border-color: #4caf50;
  color: white;
}

.option.correct .option-letter {
  background: white;
  color: #4caf50;
}

.option.wrong {
  background: #f44336;
  border-color: #f44336;
  color: white;
}

.option.wrong .option-letter {
  background: white;
  color: #f44336;
}

.quiz-buttons {
  display: flex;
  gap: 15px;
  margin-top: 30px;
  justify-content: center;
}

.btn-next {
  background: #6b3e2e;
  color: #f3c6d0;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  transition: 0.2s;
  display: none;
}

.btn-next:hover {
  background: #5a2f23;
  transform: scale(1.05);
}

.btn-next.show {
  display: block;
}

.btn-back {
  background: #e8a6b8;
  color: #6b3e2e;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  transition: 0.2s;
}

.btn-back:hover {
  background: #d88fa6;
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>
  <div class="left-header">
    <div class="title"><span class="icon">Ψ</span> PsychoQuiz</div>
    <div class="menu">
      <div class="menu-item" onclick="showHome()">Home</div>
      <div class="menu-item">Quiz</div>
      <div class="menu-item">Risultati</div>
    </div>
  </div>

  <div class="header-right">
    <div class="language">IT ▼</div>
    <div class="search-icon">🔍</div>
  </div>
</header>

<!-- HOME -->
<div class="page" id="home" style="display:flex;">
  <div class="card">
    Casi clinici
    <div class="subtitle">Analisi di casi reali e clinici</div>
  </div>

  <div class="card" onclick="showQuizConfig()">
    Quiz completo
    <div class="subtitle">Tutte le materie mescolate</div>
  </div>

  <div class="card" onclick="showMaterie()">
    Quiz per materia
    <div class="subtitle">Scegli una o più materie</div>
  </div>
</div>

<!-- QUIZ CONFIG -->
<div class="page" id="quizConfig">
  <div class="config-box">
    <h3>Configura quiz</h3>

    <div id="selectedMaterieLabel"></div>

    <label>Numero domande</label>
    <select id="numQ">
      <option>5</option>
      <option>10</option>
      <option selected>15</option>
      <option>20</option>
      <option>30</option>
    </select>

    <label>Difficoltà</label>
    <select id="diff">
      <option value="all">Tutte</option>
      <option value="facile">Facile</option>
      <option value="medio">Medio</option>
      <option value="difficile">Difficile</option>
    </select>

    <label>Formato quiz</label>
    <select id="format">
      <option value="mcq">Crocette (4 opzioni)</option>
      <option value="open" disabled>Risposta libera (presto disponibile)</option>
    </select>

    <button class="start-btn" onclick="startQuiz()">Inizia quiz</button>
  </div>
</div>

<!-- MATERIE -->
<div class="page" id="materie">
  <div class="materie-wrapper">

    <div id="startQuizBtn">Inizia quiz</div>

    <div class="materie-topbar">
      <input id="materieSearch" type="text" placeholder="Cerca materia..." onkeyup="filterMaterie()">
    </div>

    <div class="materie-grid" id="materieGrid"></div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div class="page" id="quiz">
  <div class="quiz-header">
    <span>Domanda <span id="currentQuestion">1</span> di <span id="totalQuestions">5</span></span>
    <span id="materiaQuiz">Psicologia generale</span>
  </div>

  <div class="quiz-progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="quiz-container">
    <div class="question-text" id="questionText">Domanda qui</div>
    
    <div class="options" id="optionsContainer"></div>

    <div class="quiz-buttons">
      <button class="btn-back" onclick="goBack()">← Indietro</button>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">Prossima →</button>
    </div>
  </div>
</div>

<!-- CARICA IL DATABASE DELLE DOMANDE -->
<script src="questions.js"></script>

<!-- SCRIPT PRINCIPALE -->
<script>
// Variabili globali
let selected = [];
let currentQuestionIndex = 0;
let selectedAnswer = null;
let quizQuestions = [];

// Funzione per ottenere tutte le materie disponibili da questionsBySubject
function getAllMaterie() {
  return Object.keys(questionsBySubject).sort();
}

// Popola la griglia delle materie
function populateMaterieGrid() {
  const grid = document.getElementById("materieGrid");
  grid.innerHTML = "";
  
  getAllMaterie().forEach(materia => {
    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-materia", materia);
    card.textContent = materia;
    card.onclick = () => toggleMaterieSelection(card, materia);
    grid.appendChild(card);
  });
  
  updateSubjectCounts();
}

// Filtra le materie in base alla ricerca
function filterMaterie() {
  const searchTerm = document.getElementById("materieSearch").value.toLowerCase();
  const cards = document.querySelectorAll("#materieGrid .card");
  
  cards.forEach(card => {
    const materia = card.getAttribute("data-materia").toLowerCase();
    if (materia.includes(searchTerm)) {
      card.style.display = "flex";
    } else {
      card.style.display = "none";
    }
  });
}

// Toggle selezione materia
function toggleMaterieSelection(card, materia) {
  if (card.classList.contains("selected")) {
    card.classList.remove("selected");
    selected = selected.filter(m => m !== materia);
  } else {
    if (selected.length < 6) {
      card.classList.add("selected");
      selected.push(materia);
    } else {
      alert("Puoi selezionare massimo 6 materie per volta!");
    }
  }
  updateStartButton();
}

// Aggiorna il conteggio delle domande per ogni materia
function updateSubjectCounts() {
  const cards = document.querySelectorAll("#materieGrid .card");
  cards.forEach(card => {
    const materia = card.getAttribute("data-materia");
    const count = questionsBySubject[materia]?.length || 0;
    const originalText = materia;
    card.textContent = `${originalText} (${count})`;
    card.setAttribute("data-materia", originalText);
  });
}

// Aggiorna il bottone start
function updateStartButton() {
  const btn = document.getElementById("startQuizBtn");
  if (selected.length > 0) {
    btn.style.display = "block";
    btn.textContent = selected.length === 1 
      ? "▶ Inizia quiz" 
      : `▶ Inizia quiz (${selected.length} materie)`;
  } else {
    btn.style.display = "none";
  }
}

// Navigazione
function showHome() {
  document.getElementById("home").style.display = "flex";
  document.getElementById("materie").style.display = "none";
  document.getElementById("quizConfig").style.display = "none";
  document.getElementById("quiz").style.display = "none";
  
  selected = [];
  updateStartButton();
}

function showMaterie() {
  document.getElementById("home").style.display = "none";
  document.getElementById("materie").style.display = "flex";
  document.getElementById("quizConfig").style.display = "none";
  document.getElementById("quiz").style.display = "none";
  
  if (document.getElementById("materieGrid").children.length === 0) {
    populateMaterieGrid();
  } else {
    updateSubjectCounts();
  }
}

function showQuizConfig() {
  if (selected.length === 0) {
    alert("Seleziona almeno una materia prima di continuare!");
    showMaterie();
    return;
  }
  
  document.getElementById("home").style.display = "none";
  document.getElementById("materie").style.display = "none";
  document.getElementById("quizConfig").style.display = "flex";
  document.getElementById("quiz").style.display = "none";
  
  const label = document.getElementById("selectedMaterieLabel");
  label.innerHTML = `<strong>Materie selezionate:</strong><br>${selected.join(", ")}`;
}

function goBack() {
  document.getElementById("quizConfig").style.display = "flex";
  document.getElementById("quiz").style.display = "none";
  currentQuestionIndex = 0;
  selectedAnswer = null;
}

// Avvia il quiz
function startQuiz() {
  const format = document.getElementById("format").value;
  
  if (format !== "mcq") {
    alert("Al momento è disponibile solo il formato a crocette");
    return;
  }
  
  // Raccogli tutte le domande dalle materie selezionate
  quizQuestions = [];
  
  selected.forEach(materia => {
    const questions = questionsBySubject[materia] || [];
    questions.forEach(q => {
      quizQuestions.push({
        ...q,
        materia: materia
      });
    });
  });
  
  if (quizQuestions.length === 0) {
    alert(`Nessuna domanda disponibile per: ${selected.join(", ")}`);
    return;
  }
  
  // Filtra per difficoltà
  const difficolta = document.getElementById("diff").value;
  let filteredQuestions = quizQuestions;
  if (difficolta !== "all") {
    filteredQuestions = quizQuestions.filter(q => q.difficolta === difficolta);
    if (filteredQuestions.length === 0) {
      alert(`Nessuna domanda di livello ${difficolta} trovata`);
      return;
    }
  }
  
  // Mescola e limita
  filteredQuestions = filteredQuestions.sort(() => Math.random() - 0.5);
  let numQ = parseInt(document.getElementById("numQ").value);
  numQ = Math.min(numQ, filteredQuestions.length);
  quizQuestions = filteredQuestions.slice(0, numQ);
  
  currentQuestionIndex = 0;
  selectedAnswer = null;
  
  document.getElementById("quizConfig").style.display = "none";
  document.getElementById("quiz").style.display = "flex";
  
  loadQuestion();
}

// Carica la domanda corrente
function loadQuestion() {
  const question = quizQuestions[currentQuestionIndex];
  
  document.getElementById("currentQuestion").textContent = currentQuestionIndex + 1;
  document.getElementById("totalQuestions").textContent = quizQuestions.length;
  document.getElementById("materiaQuiz").textContent = question.materia || selected.join(", ");
  
  const progress = ((currentQuestionIndex + 1) / quizQuestions.length) * 100;
  document.getElementById("progressBar").style.width = progress + "%";
  
  document.getElementById("questionText").textContent = question.domanda;
  
  const optionsContainer = document.getElementById("optionsContainer");
  optionsContainer.innerHTML = "";
  
  const letters = ["A", "B", "C", "D"];
  question.risposte.forEach((risposta, index) => {
    const option = document.createElement("div");
    option.className = "option";
    option.innerHTML = `
      <div class="option-letter">${letters[index]}</div>
      <div>${risposta}</div>
    `;
    
    option.onclick = () => selectAnswer(index, option);
    optionsContainer.appendChild(option);
  });
  
  selectedAnswer = null;
  document.getElementById("btnNext").classList.remove("show");
}

// Seleziona una risposta
function selectAnswer(answerIndex, optionElement) {
  if (selectedAnswer !== null) return;
  
  selectedAnswer = answerIndex;
  const question = quizQuestions[currentQuestionIndex];
  const allOptions = document.querySelectorAll(".option");
  
  allOptions.forEach((opt, index) => {
    opt.style.pointerEvents = "none";
    if (index === question.corretta) {
      opt.classList.add("correct");
    } else if (index === answerIndex && answerIndex !== question.corretta) {
      opt.classList.add("wrong");
    }
  });
  
  document.getElementById("btnNext").classList.add("show");
}

// Prossima domanda
function nextQuestion() {
  currentQuestionIndex++;
  
  if (currentQuestionIndex < quizQuestions.length) {
    selectedAnswer = null;
    loadQuestion();
  } else {
    alert("Quiz completato! 🎉");
    goBack();
  }
}

// Inizializzazione
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("startQuizBtn").onclick = () => {
    if (selected.length > 0) {
      showQuizConfig();
    } else {
      alert("Seleziona almeno una materia!");
    }
  };
});
</script>

</body>
</html>
