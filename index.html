<!DOCTYPE html>
<html>
<head>
  <title>PsychoQuiz</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
      font-family: Arial, sans-serif;
    }

    header {
      width: 100%;
      background: #6b3e2e;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title {
      color: #f3c6d0;
      font-family: "Emilys Candy", serif;
      font-size: 32px;
    }

    .menu-item {
      background: #f3c6d0;
      color: #6b3e2e;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .page {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 80px;
    }

    .card {
      background: #f3c6d0;
      width: 260px;
      height: 120px;
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      margin: 10px;
      font-weight: bold;
    }

    /* QUIZ SETUP */
    #quizSetup {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    select, button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
    }

    button {
      background: #6b3e2e;
      color: #f3c6d0;
      cursor: pointer;
    }

    /* QUIZ */
    #quizPage {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .option {
      background: #f3c6d0;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      width: 250px;
      text-align: center;
    }

    input[type="text"] {
      padding: 10px;
      border-radius: 10px;
      border: none;
      width: 250px;
    }

  </style>
</head>

<body>

<header>
  <div class="title">PsychoQuiz</div>

  <div class="menu-item" onclick="openSetup()">Quiz completo</div>
</header>

<!-- HOME -->
<div class="page" id="home" style="display:flex;">
  <div class="card" onclick="openSetup()">Quiz completo</div>
</div>

<!-- SETUP -->
<div class="page" id="quizSetup">

  <h2>Imposta il quiz</h2>

  <label>Numero domande</label>
  <select id="numQ">
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="15">15</option>
  </select>

  <label>Difficoltà</label>
  <select id="diff">
    <option value="facile">Facile</option>
    <option value="medio">Medio</option>
    <option value="difficile">Difficile</option>
  </select>

  <button onclick="startQuiz()">Inizia quiz</button>
</div>

<!-- QUIZ -->
<div class="page" id="quizPage">

  <h3 id="question"></h3>

  <div id="answers"></div>

</div>

<script>

let questions = [
  {
    q: "Cos'è la memoria a breve termine?",
    diff: "facile",
    type: "crocette",
    options: ["Magazzino temporaneo", "Memoria permanente", "Emozione", "Istinto"],
    correct: 0
  },
  {
    q: "Cos'è il condizionamento classico?",
    diff: "medio",
    type: "aperta",
    correct: "apprendimento associativo"
  },
  {
    q: "Neuroscienze studiano...",
    diff: "facile",
    type: "crocette",
    options: ["Cervello", "Cuore", "Muscoli", "Ossa"],
    correct: 0
  }
];

let current = 0;
let score = 0;
let quizData = [];

function openSetup() {
  document.getElementById("home").style.display = "none";
  document.getElementById("quizSetup").style.display = "flex";
}

function startQuiz() {

  let num = parseInt(document.getElementById("numQ").value);
  let diff = document.getElementById("diff").value;

  quizData = questions.filter(q => q.diff === diff);
  quizData = quizData.slice(0, num);

  current = 0;
  score = 0;

  document.getElementById("quizSetup").style.display = "none";
  document.getElementById("quizPage").style.display = "flex";

  showQuestion();
}

function showQuestion() {

  if (current >= quizData.length) {
    alert("Quiz finito! Punteggio: " + score);
    location.reload();
    return;
  }

  let q = quizData[current];

  document.getElementById("question").innerText = q.q;

  let ans = document.getElementById("answers");
  ans.innerHTML = "";

  if (q.type === "crocette") {
    q.options.forEach((opt, i) => {
      let div = document.createElement("div");
      div.className = "option";
      div.innerText = opt;
      div.onclick = () => {
        if (i === q.correct) score++;
        current++;
        showQuestion();
      };
      ans.appendChild(div);
    });
  }

  else {
    let input = document.createElement("input");
    input.placeholder = "Scrivi la risposta...";
    ans.appendChild(input);

    let btn = document.createElement("button");
    btn.innerText = "Invia";
    btn.onclick = () => {
      if (input.value.toLowerCase().includes(q.correct)) score++;
      current++;
      showQuestion();
    };

    ans.appendChild(btn);
  }
}

</script>

</body>
</html>
