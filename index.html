<!DOCTYPE html>
<html>
<head>
<title>PsychoQuiz GitHub - Quiz di Psicologia Online</title>

<meta name="google-site-verification" content="Oftahp3yLVsmYHEXx1s6UvEe3Yze6kEMNYgIoSQl3_k" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
  font-family: Arial, sans-serif;
}

header {
  width: 100%;
  background: #6b3e2e;
  padding: 10px 20px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 25px;
}

.title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #f3c6d0;
  font-family: "Emilys Candy", serif;
  font-size: 32px;
}

.icon { font-size: 34px; }

.menu {
  display: flex;
  gap: 10px;
}

.menu-item {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.menu-item:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.language {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 5px 10px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.language:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.search-icon {
  color: #f3c6d0;
  font-size: 20px;
  cursor: pointer;
}

.page {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 80px;
}

.card {
  background: #f3c6d0;
  width: 260px;
  height: 140px;
  border-radius: 16px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #6b3e2e;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  flex-direction: column;
}

.card:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.subtitle {
  font-size: 13px;
  font-weight: normal;
  margin-top: 6px;
}

#materie {
  flex-direction: column;
  align-items: center;
}

.materie-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
}

#startQuizBtn {
  display: none;
  margin-top: 10px;
  background: #f3c6d0;
  color: #6b3e2e;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  font-size: 18px;
  width: 240px;
  text-align: center;
  padding: 12px 0;
  transition: 0.2s;
}

#startQuizBtn:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.materie-topbar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

#materieSearch {
  width: 260px;
  padding: 8px 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 14px;
}

.materie-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  padding: 20px;
}

#materie .card {
  width: 170px;
  height: 60px;
  font-size: 15px;
  flex-direction: row;
}

.card.selected {
  background: #6b3e2e;
  color: #f3c6d0;
}

#quizConfig {
  display: none;
  flex-direction: column;
  align-items: center;
}

.config-box {
  background: #f3c6d0;
  padding: 20px;
  border-radius: 16px;
  width: 260px;
  text-align: center;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin: 8px 0;
}

.start-btn {
  background: #6b3e2e;
  color: #f3c6d0;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}

#selectedMaterieLabel {
  margin-bottom: 10px;
  font-size: 13px;
  color: #6b3e2e;
}

/* QUIZ */
#quiz {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  margin-top: 40px;
  padding: 20px;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 600px;
  margin-bottom: 20px;
  font-size: 16px;
  color: #6b3e2e;
  font-weight: bold;
}

.quiz-progress {
  width: 100%;
  max-width: 600px;
  height: 8px;
  background: #e8a6b8;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  background: #6b3e2e;
  width: 0%;
  transition: width 0.3s;
}

.quiz-container {
  background: #f3c6d0;
  padding: 40px;
  border-radius: 16px;
  width: 100%;
  max-width: 600px;
}

.question-text {
  font-size: 20px;
  font-weight: bold;
  color: #6b3e2e;
  margin-bottom: 30px;
  text-align: center;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option {
  background: white;
  border: 2px solid #e8a6b8;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.option.correct { background: #4caf50; color: white; }
.option.wrong { background: #f44336; color: white; }

.btn-next {
  display: none;
}
.btn-next.show {
  display: block;
}
</style>
</head>

<body>

<header>
  <div class="left-header">
    <div class="title"><span class="icon">Ψ</span> PsychoQuiz</div>
    <div class="menu">
      <div class="menu-item" onclick="showHome()">Home</div>
      <div class="menu-item">Quiz</div>
      <div class="menu-item">Risultati</div>
    </div>
  </div>
</header>

<div class="page" id="home" style="display:flex;">
  <div class="card">Casi clinici</div>

  <div class="card" onclick="showQuizConfig()">
    Quiz completo
  </div>

  <div class="card" onclick="showMaterie()">
    Quiz per materia
  </div>
</div>

<div class="page" id="quizConfig">
  <div class="config-box">
    <h3>Configura quiz</h3>

    <div id="selectedMaterieLabel"></div>

    <label>Numero domande</label>
    <select id="numQ">
      <option>5</option>
      <option>10</option>
      <option>15</option>
    </select>

    <label>Difficoltà</label>
    <select id="diff"></select>

    <label>Formato quiz</label>
    <select id="format">
      <option value="mcq">Crocette</option>
    </select>

    <button class="start-btn" onclick="startQuiz()">Inizia quiz</button>
  </div>
</div>

<div class="page" id="materie">
  <div class="materie-wrapper">
    <div id="startQuizBtn">Inizia quiz</div>

    <div class="materie-grid">

      <div class="card">Psicologia generale</div>
      <div class="card">Psicologia sociale</div>

    </div>
  </div>
</div>

<div class="page" id="quiz">
  <div class="quiz-header">
    <span>Domanda <span id="currentQuestion">1</span></span>
  </div>

  <div class="quiz-container">
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>

    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Next</button>
  </div>
</div>

<script>

/* FIX MINIMO: DATABASE CORRETTO */
const questionsBySubject = {
  "Psicologia generale": [],
  "Psicologia sociale": []
};

let selected = [];
let quizQuestions = [];
let currentQuestionIndex = 0;

/* NAV */
function showHome(){
  document.getElementById("home").style.display="flex";
  document.getElementById("materie").style.display="none";
  document.getElementById("quizConfig").style.display="none";
  document.getElementById("quiz").style.display="none";
}

function showMaterie(){
  document.getElementById("home").style.display="none";
  document.getElementById("materie").style.display="flex";
}

function showQuizConfig(){
  document.getElementById("quizConfig").style.display="flex";
}

/* FIX CLICK */
document.querySelectorAll("#materie .card").forEach(card=>{
  card.addEventListener("click",()=>{
    const name = card.innerText;

    if(selected.includes(name)){
      selected = selected.filter(x=>x!==name);
      card.classList.remove("selected");
    } else {
      selected.push(name);
      card.classList.add("selected");
    }

    document.getElementById("startQuizBtn").style.display =
      selected.length ? "block" : "none";
  });
});

/* QUIZ */
function startQuiz(){
  quizQuestions = [];
  selected.forEach(s=>{
    quizQuestions = quizQuestions.concat(questionsBySubject[s] || []);
  });

  currentQuestionIndex = 0;

  document.getElementById("quizConfig").style.display="none";
  document.getElementById("quiz").style.display="flex";

  loadQuestion();
}

function loadQuestion(){
  const q = quizQuestions[currentQuestionIndex];
  if(!q) return;

  document.getElementById("questionText").innerText = q.domanda;
}

function nextQuestion(){
  currentQuestionIndex++;
  loadQuestion();
}

</script>

</body>
</html>
