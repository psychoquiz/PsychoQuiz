<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PsychoQuiz - Quiz Psicologia</title>

<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
  background: #6b3e2e;
  color: #f3c6d0;
}

.title {
  font-family: "Emilys Candy", serif;
  font-size: 28px;
}

/* MENU */
.menu-item {
  display: inline-block;
  margin-left: 10px;
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 6px 12px;
  border-radius: 12px;
  cursor: pointer;
}

/* PAGES */
.page { display: none; padding: 20px; }
.active { display: flex; flex-direction: column; align-items: center; }

/* HOME */
.card {
  background: #f3c6d0;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
  cursor: pointer;
}

/* MATERIE */
.materie-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.subject {
  padding: 10px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
}

.subject.selected {
  background: #6b3e2e;
  color: white;
}

#startQuizBtn {
  display: none;
  margin-top: 20px;
  padding: 10px;
  background: #6b3e2e;
  color: white;
  cursor: pointer;
  border-radius: 10px;
}

/* QUIZ */
.quiz-box {
  max-width: 600px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

.option {
  padding: 10px;
  margin: 5px 0;
  border: 1px solid #ccc;
  cursor: pointer;
  border-radius: 8px;
}

.option.correct { background: #4caf50; color: white; }
.option.wrong { background: #f44336; color: white; }

.btn {
  margin-top: 10px;
  padding: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="title">Ψ PsychoQuiz</div>
  <div>
    <span class="menu-item" onclick="showHome()">Home</span>
    <span class="menu-item" onclick="showMaterie()">Quiz per materia</span>
  </div>
</header>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card" onclick="showMaterie()">Quiz per materia</div>
</div>

<!-- MATERIE -->
<div id="materie" class="page">

  <h3>Seleziona materie</h3>

  <div class="materie-grid" id="subjects"></div>

  <div id="startQuizBtn" onclick="goConfig()">Inizia quiz</div>
</div>

<!-- CONFIG -->
<div id="config" class="page">
  <h3>Configurazione</h3>

  <label>Numero domande</label>
  <select id="numQ">
    <option>5</option>
    <option>10</option>
    <option>15</option>
  </select>

  <button onclick="startQuiz()">Avvia</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="page">

  <div class="quiz-box">
    <h3 id="question"></h3>

    <div id="options"></div>

    <button class="btn" onclick="next()">Next</button>
  </div>

</div>

<script>

/* =====================
   DATABASE
===================== */
const questionsBySubject = {
  "Psicologia generale": [
    {
      domanda: "Cos'è la memoria?",
      risposte: ["Un processo cognitivo", "Un muscolo", "Un nervo", "Un riflesso"],
      corretta: 0
    }
  ],
  "Psicologia sociale": [],
  "Neuroscienze": []
};

/* =====================
   STATE
===================== */
let selected = [];
let quiz = [];
let index = 0;

/* =====================
   NAV
===================== */
function show(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

function showHome(){ show("home"); }
function showMaterie(){ renderSubjects(); show("materie"); }
function goConfig(){ show("config"); }

/* =====================
   MATERIE
===================== */
function renderSubjects() {
  const container = document.getElementById("subjects");
  container.innerHTML = "";

  Object.keys(questionsBySubject).forEach(name => {
    const div = document.createElement("div");
    div.className = "subject";
    div.innerText = name;

    div.onclick = () => {
      if (selected.includes(name)) {
        selected = selected.filter(x => x !== name);
        div.classList.remove("selected");
      } else {
        selected.push(name);
        div.classList.add("selected");
      }

      document.getElementById("startQuizBtn").style.display =
        selected.length ? "block" : "none";
    };

    container.appendChild(div);
  });
}

/* =====================
   QUIZ
===================== */
function startQuiz() {

  quiz = [];

  selected.forEach(s => {
    quiz = quiz.concat(questionsBySubject[s] || []);
  });

  quiz = quiz.sort(() => Math.random() - 0.5);

  const n = parseInt(document.getElementById("numQ").value);
  quiz = quiz.slice(0, n);

  index = 0;

  show("quiz");
  load();
}

function load() {
  const q = quiz[index];

  document.getElementById("question").innerText = q.domanda;

  const container = document.getElementById("options");
  container.innerHTML = "";

  q.risposte.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerText = r;

    div.onclick = () => {
      document.querySelectorAll(".option").forEach(o => {
        o.onclick = null;
      });

      if (i === q.corretta) div.classList.add("correct");
      else div.classList.add("wrong");
    };

    container.appendChild(div);
  });
}

function next() {
  index++;
  if (index >= quiz.length) {
    alert("Quiz finito!");
    showHome();
    return;
  }
  load();
}

</script>

</body>
</html>
