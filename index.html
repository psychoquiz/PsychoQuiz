<!DOCTYPE html>
<html>
<head>
<title>PsychoQuiz GitHub - Quiz di Psicologia Online</title>

<meta name="google-site-verification" content="Oftahp3yLVsmYHEXx1s6UvEe3Yze6kEMNYgIoSQl3_k" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
  font-family: Arial, sans-serif;
}

/* ===== HEADER ===== */
header {
  width: 100%;
  background: #6b3e2e;
  padding: 10px 20px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 25px;
}

.title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #f3c6d0;
  font-family: "Emilys Candy", serif;
  font-size: 32px;
}

.icon { font-size: 34px; }

.menu {
  display: flex;
  gap: 10px;
}

.menu-item {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.header-right {
  display: flex;
  gap: 10px;
}

/* ===== PAGES ===== */
.page {
  display: none;
  flex-direction: column;
  align-items: center;
  margin-top: 80px;
}

.card {
  background: #f3c6d0;
  width: 260px;
  height: 140px;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  cursor: pointer;
}

#materie .card {
  width: 170px;
  height: 60px;
  flex-direction: row;
  justify-content: center;
  align-items: center;
}

.card.selected {
  background: #6b3e2e;
  color: #f3c6d0;
}

.materie-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
}

/* ===== BUTTON ===== */
#startQuizBtn {
  display: none;
  background: #6b3e2e;
  color: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <div class="title">Ψ PsychoQuiz</div>
</header>

<!-- HOME -->
<div class="page" id="home" style="display:flex;">
  <div class="card" onclick="showMaterie()">Quiz per materia</div>
</div>

<!-- MATERIE -->
<div class="page" id="materie">
  <div id="startQuizBtn"></div>

  <div class="materie-grid">

    <div class="card">Psicologia generale</div>
    <div class="card">Psicologia sociale</div>
    <div class="card">Psicologia dello sviluppo</div>
    <div class="card">Psicobiologia</div>

  </div>
</div>

<script>

/* NAV */
function showMaterie() {
  document.getElementById("home").style.display = "none";
  document.getElementById("materie").style.display = "flex";
}

/* =========================
   FIX DATABASE LINK
   ========================= */
function getDB() {
  return window.questionsBySubject || {};
}

/* =========================
   COUNTS
   ========================= */
function updateSubjectCounts() {
  document.querySelectorAll("#materie .card").forEach(card => {

    const name = card.textContent.replace(/\(\d+\)/, "").trim();
    const count = (getDB()[name]?.length) || 0;

    card.textContent = `${name} (${count})`;
  });
}

updateSubjectCounts();

/* =========================
   MULTI SELECT
   ========================= */
let selected = [];

document.querySelectorAll("#materie .card").forEach(card => {
  card.onclick = () => {

    const name = card.textContent.replace(/\(\d+\)/, "").trim();

    if (card.classList.contains("selected")) {
      card.classList.remove("selected");
      selected = selected.filter(x => x !== name);
    } else {
      card.classList.add("selected");
      selected.push(name);
    }

    const btn = document.getElementById("startQuizBtn");
    btn.style.display = selected.length ? "block" : "none";
    btn.textContent = `Inizia quiz (${selected.length})`;
  };
});

</script>

</body>
</html>
