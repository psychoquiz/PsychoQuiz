<!DOCTYPE html>
<html>
<head>
<title>PsychoQuiz GitHub</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
  font-family: Arial, sans-serif;
}

header {
  background: #6b3e2e;
  padding: 10px;
  color: #f3c6d0;
}

.page {
  display: none;
  flex-direction: column;
  align-items: center;
  margin-top: 60px;
}

.card {
  background: #f3c6d0;
  width: 200px;
  height: 60px;
  margin: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 12px;
  cursor: pointer;
}

.card.selected {
  background: #6b3e2e;
  color: #f3c6d0;
}

#materie {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
</style>
</head>

<body>

<header>
  PsychoQuiz
</header>

<!-- HOME -->
<div id="home" class="page" style="display:flex;">
  <button onclick="showMaterie()">Vai alle materie</button>
</div>

<!-- MATERIE -->
<div id="materie" class="page">

  <div class="card" data-subject="Psicologia generale">Psicologia generale</div>
  <div class="card" data-subject="Psicologia sociale">Psicologia sociale</div>
  <div class="card" data-subject="Psicologia dello sviluppo">Psicologia sviluppo</div>
  <div class="card" data-subject="Psicobiologia">Psicobiologia</div>

</div>

<script src="questions.js"></script>

<script>

/* NAV */
function showMaterie() {
  document.getElementById("home").style.display = "none";
  document.getElementById("materie").style.display = "flex";
}

/* =========================
   CONTEGGI AUTOMATICI
   ========================= */

function updateSubjectCounts() {
  document.querySelectorAll("#materie .card").forEach(card => {

    const subject = card.dataset.subject;
    const count = (window.questionsBySubject?.[subject]?.length) || 0;

    card.innerHTML = `${subject} <span style="opacity:0.6">(${count})</span>`;
  });
}

/* =========================
   MULTI SELEZIONE
   ========================= */

let multiMode = false;
let selected = [];

function enableSelection() {
  document.querySelectorAll("#materie .card").forEach(card => {

    card.onclick = function () {

      const subject = this.dataset.subject;

      if (!multiMode) {
        alert(subject);
        return;
      }

      if (this.classList.contains("selected")) {
        this.classList.remove("selected");
        selected = selected.filter(s => s !== subject);
      } else {
        if (selected.length >= 6) return;
        this.classList.add("selected");
        selected.push(subject);
      }
    };
  });
}

/* =========================
   INIT
   ========================= */

window.addEventListener("DOMContentLoaded", () => {
  updateSubjectCounts();
  enableSelection();
});

</script>

</body>
</html>
