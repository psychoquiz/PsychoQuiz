<!DOCTYPE html>
<html>
<head>
<title>PsychoQuiz GitHub - Quiz di Psicologia Online</title>

<meta name="google-site-verification" content="Oftahp3yLVsmYHEXx1s6UvEe3Yze6kEMNYgIoSQl3_k" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Emilys+Candy&display=swap" rel="stylesheet">

<style>
/* ===== IL TUO CSS ESISTENTE ===== */
html, body {
  height: 100%;
  margin: 0;
  background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
  font-family: Arial, sans-serif;
}

header {
  width: 100%;
  background: #6b3e2e;
  padding: 10px 20px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 25px;
}

.title {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #f3c6d0;
  font-family: "Emilys Candy", serif;
  font-size: 32px;
}

.icon { font-size: 34px; }

.menu {
  display: flex;
  gap: 10px;
}

.menu-item {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.menu-item:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.language {
  background: #f3c6d0;
  color: #6b3e2e;
  padding: 5px 10px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  transition: 0.2s;
}

.language:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.search-icon {
  color: #f3c6d0;
  font-size: 20px;
  cursor: pointer;
}

.page {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin-top: 80px;
}

.card {
  background: #f3c6d0;
  width: 260px;
  height: 140px;
  border-radius: 16px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: #6b3e2e;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  flex-direction: column;
}

.card:hover {
  background: #e8a6b8;
  transform: scale(1.05);
}

.subtitle {
  font-size: 13px;
  font-weight: normal;
  margin-top: 6px;
}

#materie {
  flex-direction: column;
  align-items: center;
}

.materie-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  position: relative;
}

#startQuizBtn {
  display: none;
  background: #e6879c;
  color: #f3c6d0;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  font-size: 24px;
  width: 280px;
  text-align: center;
  padding: 15px 0;
  transition: 0.3s;
  font-family: "Emilys Candy", serif;
  border: 2px solid #f3c6d0;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  position: absolute;
  top: -40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}

#startQuizBtn:hover {
  box-shadow: 0 0 20px rgba(243, 198, 208, 0.8);
  background: #8b5e4e;
}

.materie-topbar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-top: 60px;
}

#materieSearch {
  width: 260px;
  padding: 8px 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 14px;
}

.materie-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
  padding: 20px;
}

#materie .card {
  width: 170px;
  height: 60px;
  font-size: 15px;
  flex-direction: row;
  border: 2px solid #e6879c;
}

.card.selected {
  background: #6b3e2e;
  color: #f3c6d0;
}

#quizConfig {
  display: none;
  flex-direction: column;
  align-items: center;
}

.config-box {
  background: #f3c6d0;
  padding: 20px;
  border-radius: 16px;
  width: 260px;
  text-align: center;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  border: none;
  margin: 8px 0;
}

.start-btn {
  background: #6b3e2e;
  color: #f3c6d0;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  width: 100%;
  font-weight: bold;
}

#selectedMaterieLabel {
  margin-bottom: 10px;
  font-size: 13px;
  color: #6b3e2e;
}

/* ===== SCHERMATA QUIZ ===== */
#quiz {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 30px;
  margin-top: 40px;
  padding: 20px;
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  width: 100%;
  max-width: 600px;
  margin-bottom: 20px;
  font-size: 16px;
  color: #6b3e2e;
  font-weight: bold;
}

.quiz-progress {
  width: 100%;
  max-width: 600px;
  height: 8px;
  background: #e8a6b8;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  background: #6b3e2e;
  width: 0%;
  transition: width 0.3s;
}

.quiz-container {
  background: #f3c6d0;
  padding: 40px;
  border-radius: 16px;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.question-text {
  font-size: 20px;
  font-weight: bold;
  color: #6b3e2e;
  margin-bottom: 30px;
  text-align: center;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.option {
  background: white;
  border: 2px solid #e8a6b8;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 16px;
  color: #6b3e2e;
}

.option:hover {
  background: #e8a6b8;
  transform: translateX(5px);
}

.option-letter {
  background: #6b3e2e;
  color: #f3c6d0;
  width: 30px;
  height: 30px;
  min-width: 30px;
  min-height: 30px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  flex-shrink: 0;
}

.option.selected {
  background: #6b3e2e;
  color: #f3c6d0;
  border-color: #6b3e2e;
}

.option.selected .option-letter {
  background: #f3c6d0;
  color: #6b3e2e;
}

.option.correct {
  background: #4caf50;
  border-color: #4caf50;
  color: white;
}

.option.correct .option-letter {
  background: white;
  color: #4caf50;
}

.option.wrong {
  background: #f44336;
  border-color: #f44336;
  color: white;
}

.option.wrong .option-letter {
  background: white;
  color: #f44336;
}

.quiz-buttons {
  display: flex;
  gap: 15px;
  margin-top: 30px;
  justify-content: center;
}

.btn-next {
  background: #6b3e2e;
  color: #f3c6d0;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  transition: 0.2s;
  display: none;
}

.btn-next:hover {
  background: #5a2f23;
  transform: scale(1.05);
}

.btn-next.show {
  display: block;
}

.btn-back {
  background: #e8a6b8;
  color: #6b3e2e;
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  transition: 0.2s;
}

.btn-back:hover {
  background: #d88fa6;
  transform: scale(1.05);
}

/* ===== MEDIA QUERY PER TELEFONI ===== */
@media (max-width: 768px) {
  header {
    padding: 8px 12px;
    flex-direction: column;
    gap: 10px;
  }
  
  .left-header {
    width: 100%;
    justify-content: space-between;
  }
  
  .title {
    font-size: 20px;
  }
  
  .icon {
    font-size: 24px;
  }
  
  .menu-item {
    padding: 4px 10px;
    font-size: 11px;
  }
  
  .page {
    margin-top: 30px;
    gap: 15px;
  }
  
  .card {
    width: 200px;
    height: 110px;
    font-size: 14px;
  }
  
  .subtitle {
    font-size: 10px;
  }
  
  .materie-grid {
    gap: 12px;
    padding: 15px;
  }
  
  #materie .card {
    width: 140px;
    height: 50px;
    font-size: 12px;
  }
  
  #startQuizBtn {
    width: 220px;
    font-size: 18px;
    padding: 12px 0;
    top: -35px;
  }
  
  .config-box {
    width: 220px;
    padding: 15px;
  }
  
  .config-box h3 {
    font-size: 16px;
  }
  
  select {
    font-size: 12px;
    padding: 6px;
  }
  
  .start-btn {
    font-size: 14px;
    padding: 8px;
  }
  
  .quiz-container {
    padding: 20px;
    margin: 0 15px;
  }
  
  .question-text {
    font-size: 16px;
    margin-bottom: 20px;
  }
  
  .option {
    padding: 10px;
    font-size: 13px;
  }
  
  .option-letter {
    width: 25px;
    height: 25px;
    min-width: 25px;
    min-height: 25px;
    font-size: 12px;
  }
  
  .quiz-header {
    font-size: 13px;
    padding: 0 15px;
  }
  
  .btn-back, .btn-next {
    padding: 8px 20px;
    font-size: 14px;
  }
}

@media (max-width: 480px) {
  #materie .card {
    width: 120px;
    height: 45px;
    font-size: 10px;
  }
  
  .card {
    width: 170px;
    height: 95px;
    font-size: 12px;
  }
  
  .title {
    font-size: 18px;
  }
  
  .quiz-container {
    padding: 15px;
  }
  
  .question-text {
    font-size: 14px;
  }
  
  .option {
    padding: 8px;
    font-size: 12px;
  }
}
</style>
</head>
