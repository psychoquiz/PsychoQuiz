<!DOCTYPE html>
<html>
<head>
  <title>PsychoQuiz</title>

  <!-- FONT GOOGLE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Betania+Patmos+In&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f7e6e0, #f3c6d0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    header {
      width: 100%;
      background: #6b3e2e;
      color: white;
      text-align: center;
      padding: 15px 0;
      font-size: 28px;
      font-family: "Betania Patmos In", cursive;
      position: absolute;
      top: 0;
      left: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      margin-top: 80px;
    }

    p {
      color: #6b3e2e;
      font-size: 18px;
    }

    button {
      background: #e8a6b8;
      border: none;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #d17c93;
      transform: scale(1.05);
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
      color: #6b3e2e;
    }
  </style>
</head>

<body>

  <header>
    PsychoQuiz
  </header>

  <div class="card">
    <p>Domanda: Qual è la capitale d’Italia?</p>

    <button onclick="risposta('Roma')">Roma</button>
    <button onclick="risposta('Milano')">Milano</button>

    <p id="result"></p>
  </div>

  <script>
    function risposta(val) {
      if (val === "Roma") {
        document.getElementById("result").innerText = "Corretto!";
      } else {
        document.getElementById("result").innerText = "Sbagliato!";
      }
    }
  </script>

</body>
</html>
